name: Trading Engine Cron
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Call Trading Engine API
        run: |
          curl -X POST "https://finapp-backend-d2lm.onrender.com/api/jobs/process-orders" \
          -H "x-cron-key: ${{ secrets.CRON_SECRET }}"